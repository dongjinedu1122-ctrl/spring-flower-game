<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 봄꽃 AI 카드 탐험대!</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>
    <style>
        :root {
            --pink: #FF6B9D; --pink-light: #FFD6E7;
            --yellow: #FFE066; --yellow-dark: #FFB300;
            --green: #4CAF50; --green-light: #C8E6C9;
            --bg: #FFF5F9; --white: #FFFFFF;
            --text-dark: #3D2B3D; --text-mid: #7B5B7B;
            --red: #FF5252; --shadow: 0 8px 32px rgba(255,107,157,0.18);
            --radius: 24px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Jua',sans-serif; background:var(--bg); min-height:100vh; overflow-x:hidden; }

        .petal { position:fixed; top:-40px; font-size:24px; animation:fall linear infinite; pointer-events:none; z-index:0; opacity:0.6; }
        @keyframes fall { 0%{transform:translateY(-40px) rotate(0deg);opacity:0.7} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

        /* 로딩 */
        #loading-screen { position:fixed; inset:0; background:linear-gradient(135deg,#FFE4F0,#FFF5F9,#E8F5FF); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1000; text-align:center; padding:20px; }
        .loading-flower { font-size:80px; animation:bounce 1s ease-in-out infinite alternate; }
        @keyframes bounce { 0%{transform:translateY(0) scale(1)} 100%{transform:translateY(-20px) scale(1.1)} }
        .loading-text { font-size:1.5rem; color:var(--pink); margin-top:24px; line-height:1.8; }
        .loading-bar-wrap { width:260px; height:14px; background:#ffd6e7; border-radius:20px; margin:16px auto 0; overflow:hidden; }
        .loading-bar { height:100%; background:linear-gradient(90deg,var(--pink),var(--yellow)); border-radius:20px; width:0%; transition:width 0.4s; }

        /* 시작 */
        #start-screen { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#FFD6E7,#FFF5F9,#D6F0FF); flex-direction:column; align-items:center; justify-content:center; z-index:900; text-align:center; padding:20px; }
        .game-title { font-size:3.2rem; color:var(--pink); text-shadow:3px 3px 0 var(--pink-light); margin-bottom:10px; line-height:1.2; }
        .game-subtitle { font-size:1.3rem; color:var(--text-mid); margin-bottom:32px; }
        .start-flowers { display:flex; gap:14px; font-size:38px; margin-bottom:36px; animation:wiggle 2s ease-in-out infinite; }
        @keyframes wiggle { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
        .btn-start { background:var(--pink); color:white; border:none; padding:20px 60px; font-size:1.9rem; font-family:'Jua',sans-serif; border-radius:60px; cursor:pointer; box-shadow:0 6px 0 #cc4a7a,0 12px 24px rgba(255,107,157,0.4); transition:all 0.15s; position:relative; top:0; }
        .btn-start:active { top:4px; box-shadow:0 2px 0 #cc4a7a; }

        /* 게임 화면 */
        #game-screen { display:none; min-height:100vh; padding:16px; position:relative; z-index:1; }
        .game-hud { display:flex; justify-content:space-between; max-width:700px; margin:0 auto 12px; gap:10px; }
        .hud-card { background:var(--white); border-radius:14px; padding:8px 16px; box-shadow:var(--shadow); text-align:center; flex:1; }
        .hud-label { font-size:0.8rem; color:var(--text-mid); font-family:'Nanum Gothic',sans-serif; }
        .hud-value { font-size:1.7rem; color:var(--text-dark); }
        .timer-warning { color:var(--red); animation:pulse 0.5s ease-in-out infinite alternate; }
        @keyframes pulse { 0%{transform:scale(1)} 100%{transform:scale(1.15)} }

        /* 목표 카드 - 이미지 포함 */
        .target-card { max-width:700px; margin:0 auto 12px; background:var(--white); border-radius:var(--radius); padding:16px 20px; box-shadow:var(--shadow); text-align:center; border:4px solid var(--pink-light); position:relative; overflow:hidden; }
        .target-card::before { content:''; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg,var(--pink),var(--yellow),var(--green),#42A5F5,var(--pink)); background-size:200% 100%; animation:rainbow 2s linear infinite; }
        @keyframes rainbow { 0%{background-position:0%} 100%{background-position:200%} }
        .find-label { font-size:0.95rem; color:var(--text-mid); font-family:'Nanum Gothic',sans-serif; margin-bottom:6px; }
        .target-content { display:flex; align-items:center; justify-content:center; gap:20px; }
        .target-flower-name { font-size:2.8rem; color:var(--pink); text-shadow:2px 2px 0 var(--pink-light); white-space:nowrap; }
        .target-flower-img { width:160px; height:110px; object-fit:cover; border-radius:14px; border:3px solid var(--pink-light); display:none; }

        /* AI 인식률 바 */
        .feedback-bar { max-width:700px; margin:0 auto 12px; background:var(--white); border-radius:14px; padding:10px 18px; box-shadow:var(--shadow); display:flex; align-items:center; gap:10px; }
        .feedback-label { font-family:'Nanum Gothic',sans-serif; font-size:0.88rem; color:var(--text-mid); white-space:nowrap; }
        .prob-bar-wrap { flex:1; background:#f5f5f5; border-radius:20px; height:18px; overflow:hidden; }
        .prob-bar-fill { height:100%; border-radius:20px; background:linear-gradient(90deg,var(--pink),var(--yellow)); transition:width 0.3s; width:0%; }
        .prob-value { font-size:0.95rem; color:var(--text-dark); min-width:38px; text-align:right; }

        /* 카메라 */
        .camera-wrap { max-width:700px; margin:0 auto; border-radius:var(--radius); overflow:hidden; box-shadow:0 12px 40px rgba(255,107,157,0.25); border:6px solid var(--white); position:relative; background:#222; transition:border-color 0.3s; }
        .camera-wrap.success { border-color:var(--green); }
        .camera-wrap.fail { border-color:var(--red); }
        #webcam-canvas { width:100%; display:block; transform:scaleX(-1); }
        .success-overlay { position:absolute; inset:0; background:rgba(76,175,80,0.85); display:none; flex-direction:column; align-items:center; justify-content:center; font-size:5rem; z-index:10; }
        .success-overlay.show { display:flex; animation:pop 0.4s ease; }
        @keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
        .success-text { font-size:2rem; color:white; margin-top:10px; }
        .timeout-overlay { position:absolute; inset:0; background:rgba(255,82,82,0.82); display:none; flex-direction:column; align-items:center; justify-content:center; font-size:4rem; z-index:10; }
        .timeout-overlay.show { display:flex; }
        .timeout-text { font-size:1.8rem; color:white; margin-top:10px; }

        /* 라운드 인디케이터 */
        .round-indicator { display:flex; justify-content:center; gap:10px; margin:12px auto; max-width:700px; }
        .round-dot { width:30px; height:30px; border-radius:50%; background:#ddd; display:flex; align-items:center; justify-content:center; font-size:0.82rem; color:#aaa; font-family:'Nanum Gothic',sans-serif; transition:all 0.3s; }
        .round-dot.done { background:var(--green); color:white; }
        .round-dot.done-fail { background:var(--red); color:white; }
        .round-dot.current { background:var(--pink); color:white; animation:pulse 0.8s ease-in-out infinite alternate; }

        /* 결과 화면 */
        #result-screen { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#FFD6E7,#FFF5F9,#D6F0FF); flex-direction:column; align-items:center; justify-content:center; z-index:950; text-align:center; padding:24px; overflow-y:auto; }
        .result-trophy { font-size:72px; animation:bounce 1s ease-in-out infinite alternate; }
        .result-title { font-size:2.6rem; color:var(--pink); margin:14px 0 6px; }
        .result-msg { font-size:1.2rem; color:var(--text-mid); margin-bottom:24px; }
        .score-big { font-size:5rem; color:var(--yellow-dark); text-shadow:3px 3px 0 rgba(255,179,0,0.3); line-height:1; }
        .score-sub { font-size:1.1rem; color:var(--text-mid); margin-bottom:24px; font-family:'Nanum Gothic',sans-serif; }
        .result-flowers-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:28px; }
        .result-flower-chip { display:flex; align-items:center; gap:5px; padding:7px 16px; border-radius:30px; font-size:1rem; font-family:'Nanum Gothic',sans-serif; }
        .result-flower-chip.found { background:var(--green-light); color:#2E7D32; }
        .result-flower-chip.missed { background:#FFEBEE; color:#C62828; }
        .btn-retry { background:var(--yellow); color:var(--text-dark); border:none; padding:16px 52px; font-size:1.7rem; font-family:'Jua',sans-serif; border-radius:60px; cursor:pointer; box-shadow:0 6px 0 var(--yellow-dark); transition:all 0.15s; position:relative; top:0; }
        .btn-retry:active { top:4px; box-shadow:0 2px 0 var(--yellow-dark); }
    </style>
</head>

<script>
    const petalEmojis = ['🌸','🌼','🌺','🌷','🌻'];
    for(let i=0;i<12;i++){
        const el=document.createElement('div'); el.className='petal';
        el.textContent=petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
        el.style.left=Math.random()*100+'vw';
        el.style.fontSize=(16+Math.random()*20)+'px';
        el.style.animationDuration=(6+Math.random()*10)+'s';
        el.style.animationDelay=(Math.random()*10)+'s';
        document.body.appendChild(el);
    }
</script>

<!-- 배경 음악 (Web Audio API로 봄 느낌 멜로디) -->
<script>
let audioCtx, musicNodes = [], musicStarted = false;

function startMusic() {
    if(musicStarted) return;
    musicStarted = true;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // 봄 느낌 밝은 멜로디 노트 (도레미파솔라시)
    const notes = [
        523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77,
        1046.50, 987.77, 880.00, 783.99, 698.46, 659.25, 587.33
    ];
    const durations = [0.4,0.4,0.4,0.4,0.4,0.4,0.4,0.6,0.4,0.4,0.4,0.4,0.4,0.8];
    const totalDur = durations.reduce((a,b)=>a+b,0);

    function playMelody(startTime) {
        let t = startTime;
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.08, t + 0.05);
            gain.gain.linearRampToValueAtTime(0, t + durations[i] - 0.05);
            osc.start(t); osc.stop(t + durations[i]);
            t += durations[i];
        });
        return totalDur;
    }

    // 반복 재생
    let nextStart = audioCtx.currentTime + 0.1;
    function scheduleLoop() {
        const dur = playMelody(nextStart);
        nextStart += dur + 0.5;
        setTimeout(scheduleLoop, (nextStart - audioCtx.currentTime - 1) * 1000);
    }
    scheduleLoop();
}

function playSuccessSound() {
    if(!audioCtx) return;
    const freqs = [523.25, 659.25, 783.99, 1046.50];
    freqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        const t = audioCtx.currentTime + i * 0.1;
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
    });
}

function playFailSound() {
    if(!audioCtx) return;
    const freqs = [392.00, 349.23, 329.63];
    freqs.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        const t = audioCtx.currentTime + i * 0.15;
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.25);
        osc.start(t); osc.stop(t + 0.25);
    });
}
</script>

const MODEL_URL = "https://teachablemachine.withgoogle.com/models/6YUmfQwy2/";
const ALL_FLOWERS = ["벚꽃","튤립","목련","진달래","개나리","민들레","매화","산수유","할미꽃"];
const TOTAL_ROUNDS = 6;
const ROUND_TIME = 20;

let gameList=[], currentRound=0, score=0;
let timeLeft=ROUND_TIME, timerInterval;
let model, webcam;
let isRecognized=false;
let roundResults=[];
let gameRunning=false;

function setLoadingMsg(msg, pct) {
    const el=document.getElementById('loading-msg'); if(el) el.textContent=msg;
    const bar=document.getElementById('loading-bar'); if(bar && pct!==undefined) bar.style.width=pct+'%';
}

function initRoundIndicator() {
    const el=document.getElementById('round-indicator'); el.innerHTML='';
    for(let i=0;i<TOTAL_ROUNDS;i++){
        const dot=document.createElement('div');
        dot.className='round-dot'+(i===0?' current':'');
        dot.id='dot-'+i; dot.textContent=i+1; el.appendChild(dot);
    }
}

function updateRoundIndicator() {
    for(let i=0;i<TOTAL_ROUNDS;i++){
        const dot=document.getElementById('dot-'+i); dot.className='round-dot';
        if(i<currentRound){ dot.className+= roundResults[i]?' done':' done-fail'; dot.textContent=roundResults[i]?'✓':'✗'; }
        else if(i===currentRound){ dot.className+=' current'; dot.textContent=i+1; }
        else{ dot.textContent=i+1; }
    }
}

// 환경 감지
function isKakaoInApp() {
    const ua = navigator.userAgent || '';
    return /KAKAOTALK/i.test(ua) || /kakao/i.test(ua);
}
function isLocalFile() {
    return location.protocol === 'file:';
}

function copyUrl() {
    const url = location.href;
    const tryClipboard = () => {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(url);
        }
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        return Promise.resolve();
    };
    tryClipboard().then(() => {
        const el = document.getElementById('copy-msg');
        if (el) el.style.display = 'block';
    });
}

async function init() {
    // 1) 카카오톡 인앱 브라우저
    if (isKakaoInApp()) { showKakaoGuide(); return; }
    // 2) 로컬 파일 (file://)
    if (isLocalFile()) { showLocalFileGuide(); return; }

    try {
        setLoadingMsg('📷 카메라 권한을 확인하고 있어요...', 15);
        await navigator.mediaDevices.getUserMedia({video:true});

        setLoadingMsg('🧠 AI 선생님이 꽃을 공부하고 있어요...', 40);
        model = await tmImage.load(MODEL_URL+"model.json", MODEL_URL+"metadata.json");

        setLoadingMsg('📸 카메라를 연결하고 있어요...', 80);
        webcam = new tmImage.Webcam(640,480,true);
        await webcam.setup(); await webcam.play();

        const canvas=document.getElementById('webcam-canvas');
        canvas.width=640; canvas.height=480;

        setLoadingMsg('✅ 준비 완료!', 100);
        await new Promise(r=>setTimeout(r,500));

        document.getElementById('loading-screen').style.display='none';
        document.getElementById('start-screen').style.display='flex';
        window.requestAnimationFrame(loop);
    } catch(e) {
        console.error(e);
        let title, steps;
        if (e.name === 'NotAllowedError') {
            title = '카메라 권한을 허용해주세요!';
            steps = `<b>📱 Android Chrome</b><br>
주소창 왼쪽 🔒 아이콘 → 카메라 → <b>허용</b><br><br>
<b>🍎 iPhone Safari</b><br>
설정 → Safari → 카메라 → <b>허용</b>`;
        } else if (e.name === 'NotFoundError' || /not found/i.test(e.message)) {
            title = '카메라를 찾을 수 없어요!';
            steps = `<b>스마트폰</b>에서 실행하고 있나요?<br>
PC라면 웹캠을 연결하거나<br>
<b>스마트폰 Chrome / Safari</b>로 열어주세요`;
        } else {
            title = 'AI 모델을 불러오지 못했어요';
            steps = `인터넷 연결을 확인하고 다시 시도해 주세요<br><br><span style="font-size:0.8rem;color:#aaa;">${e.message}</span>`;
        }
        showGuideScreen({
            emoji: '😢',
            title,
            desc: '아래 방법을 따라해 보세요 😊',
            steps,
            btnLabel: '🔄 다시 시도',
            btnAction: 'location.reload()',
            btnColor: '#FF6B9D',
            btnShadow: '#cc4a7a'
        });
    }
}

async function loop() {
    webcam.update();
    const canvas=document.getElementById('webcam-canvas');
    canvas.getContext('2d').drawImage(webcam.canvas,0,0);
    if(gameRunning) await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    if(isRecognized) return;
    const prediction=await model.predict(webcam.canvas);
    let targetProb=0, highestProb=0, bestFlower='';
    for(let p of prediction){
        if(p.probability>highestProb){ highestProb=p.probability; bestFlower=p.className; }
        if(p.className===gameList[currentRound]) targetProb=p.probability;
    }
    const pct=Math.round(targetProb*100);
    document.getElementById('prob-bar').style.width=pct+'%';
    document.getElementById('prob-value').textContent=pct+'%';

    if(highestProb>0.90 && bestFlower===gameList[currentRound]){
        isRecognized=true; clearInterval(timerInterval);
        score++; roundResults[currentRound]=true;
        document.getElementById('score-display').textContent=score;
        playSuccessSound();
        const cw=document.getElementById('camera-wrap'); cw.classList.add('success');
        document.getElementById('success-overlay').classList.add('show');
        setTimeout(()=>{ cw.classList.remove('success'); document.getElementById('success-overlay').classList.remove('show'); currentRound++; nextRound(); }, 1200);
    }
}

function startGame() {
    startMusic();
    gameList=ALL_FLOWERS.slice().sort(()=>0.5-Math.random()).slice(0,TOTAL_ROUNDS);
    currentRound=0; score=0; roundResults=[]; gameRunning=true;
    document.getElementById('score-display').textContent='0';
    document.getElementById('start-screen').style.display='none';
    document.getElementById('game-screen').style.display='block';
    initRoundIndicator(); nextRound();
}

function nextRound() {
    document.getElementById('prob-bar').style.width='0%';
    document.getElementById('prob-value').textContent='0%';
    document.getElementById('timer-display').classList.remove('timer-warning');
    if(currentRound>=TOTAL_ROUNDS){ showResult(); return; }
    isRecognized=false; timeLeft=ROUND_TIME;
    document.getElementById('round-num').textContent=currentRound+1;
    document.getElementById('target-flower-name').textContent=gameList[currentRound];

    // 꽃 이미지 표시
    const imgEl=document.getElementById('target-flower-img');
    const imgData=FLOWER_IMAGES[gameList[currentRound]];
    if(imgData){ imgEl.src=imgData; imgEl.style.display='block'; }
    else { imgEl.style.display='none'; }

    document.getElementById('timer-display').textContent=timeLeft;
    updateRoundIndicator();
    clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        timeLeft--;
        const timerEl=document.getElementById('timer-display');
        timerEl.textContent=timeLeft;
        if(timeLeft<=5) timerEl.classList.add('timer-warning');
        else timerEl.classList.remove('timer-warning');
        if(timeLeft<=0){
            clearInterval(timerInterval);
            if(!isRecognized){
                roundResults[currentRound]=false; isRecognized=true;
                playFailSound();
                const cw=document.getElementById('camera-wrap'); cw.classList.add('fail');
                document.getElementById('timeout-overlay').classList.add('show');
                setTimeout(()=>{ cw.classList.remove('fail'); document.getElementById('timeout-overlay').classList.remove('show'); isRecognized=false; currentRound++; nextRound(); }, 1000);
            }
        }
    },1000);
}

function showResult() {
    gameRunning=false; clearInterval(timerInterval);
    document.getElementById('game-screen').style.display='none';
    document.getElementById('result-screen').style.display='flex';
    document.getElementById('final-score').textContent=score;
    const ratio=score/TOTAL_ROUNDS;
    let trophy='🏆', title='게임 종료!', msg='';
    if(ratio===1){ trophy='🥇'; title='완벽해요!'; msg='6개 모두 찾았어요! 꽃 박사님!'; }
    else if(ratio>=0.67){ trophy='🌟'; title='대단해요!'; msg='정말 잘했어요! 거의 다 찾았어요!'; }
    else if(ratio>=0.33){ trophy='👍'; title='잘했어요!'; msg='다음에는 더 잘할 수 있어요!'; }
    else{ trophy='🌱'; title='도전해요!'; msg='다시 도전해보세요, 할 수 있어요!'; }
    document.getElementById('result-trophy').textContent=trophy;
    document.getElementById('result-title').textContent=title;
    document.getElementById('result-msg').textContent=msg;
    const list=document.getElementById('result-flower-list'); list.innerHTML='';
    for(let i=0;i<TOTAL_ROUNDS;i++){
        const chip=document.createElement('div');
        chip.className='result-flower-chip '+(roundResults[i]?'found':'missed');
        chip.innerHTML=(roundResults[i]?'✓ ':'✗ ')+gameList[i];
        list.appendChild(chip);
    }
}

document.getElementById('btn-start-game').addEventListener('click', startGame);
init();
</script>
